data:
  raw_path: "data/raw/dataset.csv"
  date_column: "Date"
  target_column: "Total"
  state_column: "State"
  category_column: "Category"
  # Actual format in the CSV is M/D/YYYY (e.g. 1/12/2019); cleaner handles detection
  date_format: "%m/%d/%Y"

preprocessing:
  fill_method: "interpolate"       # interpolate, ffill, bfill
  outlier_method: "iqr"            # iqr, zscore, none
  outlier_threshold: 1.5

features:
  lag_periods: [1, 7, 14, 30]
  rolling_windows: [7, 14, 30]
  rolling_stats: ["mean", "std"]
  calendar_features: ["dayofweek", "month", "quarter", "weekofyear", "is_month_start", "is_month_end"]
  holiday_country: "US"

training:
  forecast_horizon: 8              # weeks
  cv_folds: 3                      # expanding window folds
  cv_min_train_weeks: 30           # minimum training weeks for first fold
  primary_metric: "mape"           # mape, rmse, mae
  tiebreaker_metric: "rmse"
  random_seed: 42

models:
  sarima:
    enabled: false

  prophet:
    enabled: false

  xgboost:
    enabled: true
    n_trials: 5
    param_space:
      n_estimators: [100, 500]
      max_depth: [3, 7]
      learning_rate: [0.02, 0.3]
      subsample: [0.6, 1.0]
      colsample_bytree: [0.6, 1.0]

  lightgbm:
    enabled: false
    n_trials: 5
    param_space:
      n_estimators: [100, 500]
      max_depth: [3, 7]
      learning_rate: [0.02, 0.3]
      num_leaves: [20, 80]
      subsample: [0.6, 1.0]

  lstm:
    enabled: false

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["http://localhost:8501", "http://streamlit:8501"]

cache:
  ttl_seconds: 86400               # 24 hours
  prefix: "forecast"

database:
  pool_size: 5
  max_overflow: 10
