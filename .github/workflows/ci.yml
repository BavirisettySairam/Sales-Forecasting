name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: |
          pip install --quiet poetry
          poetry install --no-interaction --no-ansi

      - name: Ruff lint
        run: poetry run ruff check src/ tests/

      - name: Black format check
        run: poetry run black --check src/ tests/

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: |
          pip install --quiet poetry
          poetry install --no-interaction --no-ansi
          pip install --quiet pip-audit safety

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit --strict

      - name: Safety advisory check
        run: safety check
        continue-on-error: true  # advisory only — do not block CI

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: forecasting_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: |
          pip install --quiet poetry
          poetry install --no-interaction --no-ansi

      - name: Run tests
        env:
          DATABASE_URL: postgresql://app:test_password@localhost:5432/forecasting_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          API_KEYS: '["forecasting-api-key-2026"]'
        run: poetry run pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Create secrets files for docker-compose
        run: |
          mkdir -p secrets
          echo "test_db_password" > secrets/db_password.txt
          echo "test_redis_password" > secrets/redis_password.txt
          echo "forecasting-api-key-2026" > secrets/api_key.txt

      - name: Build API image
        run: docker-compose build api

      - name: Build Streamlit image
        run: docker-compose build streamlit

      - name: Smoke test — start containers and hit /health
        env:
          DB_PASSWORD: test_db_password
        run: |
          docker-compose up -d postgres redis
          echo "Waiting for postgres and redis to be healthy..."
          sleep 15
          docker-compose up -d api
          echo "Waiting for API to start..."
          sleep 20
          curl -f --retry 5 --retry-delay 5 http://localhost:8000/health || \
            (docker-compose logs api && exit 1)
          docker-compose down -v
