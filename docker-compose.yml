version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forecast-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://app:${DB_PASSWORD}@postgres:5432/forecasting
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    volumes:
      - model-artifacts:/app/models
    secrets:
      - db_password
      - redis_password
      - api_key
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: forecast-dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_BASE_URL=http://api:8000
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G

  postgres:
    image: postgres:16-alpine
    container_name: forecast-db
    environment:
      POSTGRES_DB: forecasting
      POSTGRES_USER: app
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d forecasting"]
      interval: 5s
      timeout: 3s
      retries: 5
    secrets:
      - db_password
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: forecast-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  postgres-data:
  redis-data:
  model-artifacts:

secrets:
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  api_key:
    file: ./secrets/api_key.txt
